services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  loadbalancer:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app1
      - app2
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
